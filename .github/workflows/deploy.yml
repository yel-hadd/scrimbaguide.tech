name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install librsvg (for social card generation)
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Generate social card images
        run: npm run generate:social-cards -- --force

      - name: Build website
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    env:
      INDEXNOW_HOST: scrimbaguide.tech
      INDEXNOW_KEY: "04a47dc50a7a4b528f9fa0aa65c489ff"
      INDEXNOW_SUBMIT_ALL_ENDPOINTS: "true"
      # Bing IndexNow transiently returns 403 after large deployments while its
      # verification cache refreshes (usually clears within 24-48 h). Yandex and
      # the shared api.indexnow.org endpoint are sufficient for indexing signal.
      # Keep submitting to Bing (SUBMIT_ALL_ENDPOINTS=true) but don't fail CI.
      INDEXNOW_REQUIRE_BING: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Wait for GitHub Pages CDN propagation
        run: |
          echo "Waiting 60s for GitHub Pages CDN to propagate..."
          sleep 60

      - name: Verify key file is live and correct
        run: |
          if [ -z "$INDEXNOW_KEY" ]; then
            echo "::error::INDEXNOW_KEY is empty"
            exit 1
          fi
          KEY_URL="https://${INDEXNOW_HOST}/${INDEXNOW_KEY}.txt"
          for i in 1 2 3 4 5 6 7 8; do
            CONTENT=$(curl -sf "$KEY_URL" || echo "FETCH_FAILED")
            TRIMMED=$(echo "$CONTENT" | tr -d '[:space:]')
            if [ "$TRIMMED" = "$INDEXNOW_KEY" ]; then
              echo "Key file verified on attempt $i"
              exit 0
            fi
            echo "Attempt $i: got '$TRIMMED', waiting 30s..."
            sleep 30
          done
          echo "::error::Key file verification failed after 8 attempts"
          exit 1

      - name: Assert required URL exists in live sitemap
        run: node scripts/assert-sitemap-url.mjs --sitemap-url https://scrimbaguide.tech/sitemap.xml --require-url https://scrimbaguide.tech/docs/paths/

      - name: Submit URLs to IndexNow
        run: node scripts/submit-indexnow.mjs --sitemap-url https://scrimbaguide.tech/sitemap.xml --require-url https://scrimbaguide.tech/docs/paths/
