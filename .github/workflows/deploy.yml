name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install librsvg (for social card generation)
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Generate social card images
        run: npm run generate:social-cards -- --force

      - name: Build website
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Wait for GitHub Pages CDN propagation
        run: |
          echo "Waiting 60s for GitHub Pages CDN to propagate..."
          sleep 60

      - name: Verify key file is live and correct
        run: |
          for i in 1 2 3 4 5; do
            CONTENT=$(curl -sf https://scrimbaguide.tech/04a47dc50a7a4b528f9fa0aa65c489ff.txt || echo "FETCH_FAILED")
            TRIMMED=$(echo "$CONTENT" | tr -d '[:space:]')
            if [ "$TRIMMED" = "04a47dc50a7a4b528f9fa0aa65c489ff" ]; then
              echo "Key file verified on attempt $i"
              exit 0
            fi
            echo "Attempt $i: got '$TRIMMED', waiting 30s..."
            sleep 30
          done
          echo "::warning::Key file verification failed after 5 attempts — skipping IndexNow"
          exit 1

      - name: Submit URLs to IndexNow
        run: node scripts/submit-indexnow.mjs --sitemap-url https://scrimbaguide.tech/sitemap.xml
