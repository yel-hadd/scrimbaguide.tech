<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#5b3fd9"/>
  
  <!-- Subtle pattern overlay (circles) -->
  <circle cx="100" cy="100" r="400" fill="#ffffff" fill-opacity="0.05"/>
  <circle cx="1100" cy="530" r="300" fill="#ffffff" fill-opacity="0.05"/>
  
  <!-- Content Container -->
  <g transform="translate(600, 315)">
    <!-- Main Title -->
    <text x="0" y="-40" 
          dominant-baseline="middle" 
          text-anchor="middle" 
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-weight="800" 
          font-size="120" 
          fill="#ffffff"
          letter-spacing="-2">
      ScrimbaGuide
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="60" 
          dominant-baseline="middle" 
          text-anchor="middle" 
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-weight="400" 
          font-size="48" 
          fill="#e0d9ff">
      The Unofficial Guide to Scrimba
    </text>
  </g>
  
  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" rx="20" fill="none" stroke="#ffffff" stroke-width="4" stroke-opacity="0.3"/>
</svg>
